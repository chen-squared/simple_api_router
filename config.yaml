server:
  host: "0.0.0.0"
  port: 8080
  log_level: "INFO"
  log_file: "router.log"
  max_retries: 3

providers:
  # ── Anthropic ─────────────────────────────────────────────────────────────
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    endpoints:
      anthropic:
        models:
          - claude-opus-4-5
          - claude-sonnet-4-5

  # ── OpenAI ────────────────────────────────────────────────────────────────
  openai:
    api_key: "${OPENAI_API_KEY}"
    endpoints:
      openai_chat:
        models: [gpt-4o, gpt-4o-mini]
      openai_responses:
        models: [o3, o4-mini]

  # ── Multi-format upstream (all formats, one key) ──────────────────────────
  # myupstream:
  #   api_key: "${MY_KEY}"
  #   base_url: "https://myupstream.com"   # shared base_url; endpoints inherit unless overridden
  #   endpoints:
  #     anthropic:
  #       models: [claude-opus-4-5]         # uses provider base_url above
  #     openai_chat:
  #       models: [gpt-4o]
  #     openai_responses:
  #       models: [o1-preview]
  #     google:
  #       models: [gemini-2.5-pro]

  # ── Local / Self-Hosted (Ollama, vLLM, LM Studio) ────────────────────────
  # local:
  #   base_url: "http://localhost:11434"
  #   endpoints:
  #     openai_chat:
  #       models: [llama3.2, qwen2.5-coder]   # /v1 suffix on base_url is stripped automatically

  # ── Model name remapping ───────────────────────────────────────────────────
  # myprovider:
  #   api_key: "${MY_KEY}"
