server:
  host: "0.0.0.0"
  port: 8080
  log_level: "INFO"
  log_file: "router.log"
  max_retries: 3
  # Global multimodal fallback: when a text_only model receives an image/video request,
  # route it here instead. Value is "provider/model" (same format as the client model field).
  # Individual models can override this with their own multimodal_fallback field.
  # multimodal_fallback: "google/gemini-2.5-flash"

providers:
  # ── Anthropic ─────────────────────────────────────────────────────────────
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    endpoints:
      anthropic:
        models:
          - claude-opus-4-5
          - claude-sonnet-4-5

  # ── OpenAI ────────────────────────────────────────────────────────────────
  openai:
    api_key: "${OPENAI_API_KEY}"
    endpoints:
      openai_chat:
        models: [gpt-4o, gpt-4o-mini]
      openai_responses:
        models: [o3, o4-mini]

  # ── Multi-format upstream (all formats, one key) ──────────────────────────
  # myupstream:
  #   api_key: "${MY_KEY}"
  #   base_url: "https://myupstream.com"   # shared base_url; endpoints inherit unless overridden
  #   endpoints:
  #     anthropic:
  #       models: [claude-opus-4-5]         # uses provider base_url above
  #     openai_chat:
  #       models: [gpt-4o]
  #     openai_responses:
  #       models: [o1-preview]
  #     google:
  #       models: [gemini-2.5-pro]

  # ── Local / Self-Hosted (Ollama, vLLM, LM Studio) ────────────────────────
  # local:
  #   base_url: "http://localhost:11434"
  #   endpoints:
  #     openai_chat:
  #       models:
  #         - llava                          # plain string = multimodal-capable
  #         - name: qwen2.5-coder            # dict form = with extra attributes
  #           text_only: true               # mark as text-only
  #           multimodal_fallback: "local/llava"  # per-model override (optional)
  #         - name: deepseek-r1
  #           text_only: true               # uses global server.multimodal_fallback

  # ── Model name remapping ───────────────────────────────────────────────────
  # myprovider:
  #   api_key: "${MY_KEY}"
  #   endpoints:
  #     openai_chat:
  #       base_url: "https://api.example.com/v1"
  #       models: [fast, smart]
  #       model_map:
  #         fast: gpt-4o-mini
  #         smart: gpt-4o

  # ── Google Gemini ─────────────────────────────────────────────────────────
  # google:
  #   api_key: "${GOOGLE_API_KEY}"
  #   endpoints:
  #     google:
  #       models: [gemini-2.5-pro, gemini-2.5-flash]

# ── Pricing (optional) ────────────────────────────────────────────────────────
# Pricing can be set inline in each model entry (recommended — no name repetition):
#
# providers:
#   anthropic:
#     endpoints:
#       anthropic:
#         models:
#           - name: claude-opus-4-5
#             pricing:
#               input: 15.0
#               output: 75.0
#               cache_read: 1.50
#               cache_write: 18.75
#           - name: claude-sonnet-4-5
#             pricing:
#               input: 3.0
#               output: 15.0
#   google:
#     api_key: "${GOOGLE_API_KEY}"
#     endpoints:
#       google:
#         models:
#           - name: gemini-2.5-pro
#             pricing:
#               tiers:             # tiered: whole request billed at matching tier
#                 - threshold: 0   # < 200 K input tokens
#                   input: 1.25
#                   output: 10.0
#                   cache_read: 0.31
#                   cache_write: 4.50
#                 - threshold: 200000   # ≥ 200 K input tokens
#                   input: 2.50
#                   output: 15.0
#                   cache_read: 0.625
#                   cache_write: 9.00
#
# Alternatively, use the top-level pricing section (falls back when inline is absent):
# pricing:
#   "anthropic/claude-opus-4-5":
#     input: 15.0
#     output: 75.0
