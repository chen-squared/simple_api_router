server:
  host: "0.0.0.0"
  port: 8080
  log_level: "INFO"
  log_file: "router.log"
  max_retries: 3

  # ── Per-type fallback models ───────────────────────────────────────────────
  # When a model doesn't natively support a media type, the router automatically
  # describes the content using the fallback model before forwarding the request.
  # Per-model overrides (model.image_fallback etc.) take precedence.
  # Value is "provider/model" (same format as the client `model` field).
  # image_fallback: "google/gemini-2.5-flash"
  # audio_fallback: "openai/gpt-4o-audio-preview"
  # video_fallback: "google/gemini-2.5-flash"
  # pdf_fallback: "anthropic/claude-opus-4-5"   # describe PDFs for non-PDF models

  # ── MCP media tools ────────────────────────────────────────────────────────
  # When any of these is set, the router mounts the corresponding tool at /mcp.
  # Claude Code config: { "mcpServers": { "media": { "type": "http",
  #                        "url": "http://localhost:8080/mcp" } } }
  # image_model: "google/gemini-2.5-flash"      # enables image_understanding tool
  # audio_model: "openai/gpt-4o-audio-preview"  # enables audio_understanding tool
  # video_model: "google/gemini-2.5-flash"      # enables video_understanding tool
  # pdf_model: "anthropic/claude-opus-4-5"      # enables pdf_understanding tool

  # Debug logging: log all 4 request/response stages to a file.
  # Each request gets a short ID; grep by it to see the full round-trip:
  #   grep "req=ab12cd34" /tmp/router_debug.log
  # debug_log: "/tmp/router_debug.log"

  # ── Global model aliases ───────────────────────────────────────────────────
  # Clients may use the alias as the model name (no "provider/" prefix needed).
  # Billing uses the resolved "provider/model", not the alias.
  # model_map:
  #   claude:  "anthropic/claude-opus-4-5"
  #   sonnet:  "anthropic/claude-sonnet-4-5"
  #   fast:    "openai/gpt-4o-mini"

providers:
  # ── Anthropic ─────────────────────────────────────────────────────────────
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    endpoints:
      anthropic:
        models:
          # claude-opus-4-5 and claude-sonnet-4-5 support images and PDFs natively.
          - name: claude-opus-4-5
            multimodality: [image, pdf]
          - name: claude-sonnet-4-5
            multimodality: [image, pdf]

  # ── OpenAI ────────────────────────────────────────────────────────────────
  openai:
    api_key: "${OPENAI_API_KEY}"
    endpoints:
      openai_chat:
        models:
          - name: gpt-4o
            multimodality: [image]
          - name: gpt-4o-mini
            multimodality: [image]
      openai_responses:
        models:
          - o3
          - o4-mini

  # ── Multi-format upstream (all formats, one key) ──────────────────────────
  # myupstream:
  #   api_key: "${MY_KEY}"
  #   base_url: "https://myupstream.com"
  #   endpoints:
  #     anthropic:
  #       models:
  #         - name: claude-opus-4-5
  #           multimodality: [image]
  #     openai_chat:
  #       models:
  #         - name: gpt-4o
  #           multimodality: [image, audio]
  #     google:
  #       models:
  #         - name: gemini-2.5-pro
  #           multimodality: [image, video]
  #           # per-model fallback override:
  #           # audio_fallback: "openai/gpt-4o-audio-preview"

  # ── Local / Self-Hosted (Ollama, vLLM, LM Studio) ────────────────────────
  # local:
  #   base_url: "http://localhost:11434"
  #   endpoints:
  #     openai_chat:
  #       models:
  #         - name: llava              # vision model
  #           multimodality: [image]
  #         - name: qwen2.5-coder      # text-only: no multimodality → fallback triggers
  #           image_fallback: "local/llava"   # per-model override
  #         - deepseek-r1              # plain string = no media support, uses global fallbacks

  # ── Model name remapping ───────────────────────────────────────────────────
  # myprovider:
  #   api_key: "${MY_KEY}"
  #   endpoints:
  #     openai_chat:
  #       base_url: "https://api.example.com/v1"
  #       models: [fast, smart]
  #       model_map:
  #         fast: gpt-4o-mini
  #         smart: gpt-4o

  # ── Google Gemini ─────────────────────────────────────────────────────────
  # google:
  #   api_key: "${GOOGLE_API_KEY}"
  #   endpoints:
  #     google:
  #       models:
  #         - name: gemini-2.5-pro
  #           multimodality: [image, video]
  #         - name: gemini-2.5-flash
  #           multimodality: [image, video]

# ── Pricing (optional) ────────────────────────────────────────────────────────
# Pricing can be set inline in each model entry (recommended — no name repetition):
#
# providers:
#   anthropic:
#     endpoints:
#       anthropic:
#         models:
#           - name: claude-opus-4-5
#             multimodality: [image, pdf]
#             pricing:
#               input: 15.0
#               output: 75.0
#               cache_read: 1.50
#               cache_write: 18.75
#           - name: claude-sonnet-4-5
#             multimodality: [image, pdf]
#             pricing:
#               input: 3.0
#               output: 15.0
#   google:
#     api_key: "${GOOGLE_API_KEY}"
#     endpoints:
#       google:
#         models:
#           - name: gemini-2.5-pro
#             multimodality: [image, video]
#             pricing:
#               tiers:             # tiered: whole request billed at matching tier
#                 - threshold: 0
#                   input: 1.25
#                   output: 10.0
#                   cache_read: 0.31
#                   cache_write: 4.50
#                 - threshold: 200000
#                   input: 2.50
#                   output: 15.0
#                   cache_read: 0.625
#                   cache_write: 9.00
#
# Alternatively, use the top-level pricing section (falls back when inline is absent):
# pricing:
#   "anthropic/claude-opus-4-5":
#     input: 15.0
#     output: 75.0

