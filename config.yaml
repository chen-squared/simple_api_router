server:
  host: "0.0.0.0"
  port: 8080
  log_level: "INFO"
  log_file: "router.log"

# All requests go to the default group
default_group: main

apis:
  openai-primary:
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    type: openai
    retry:
      max_retries: 3
      cooldown_after: 5
      cooldown_duration: 300
      error_limits:
        429: 1
        500: 3
        502: 3
        503: 5
    usage:
      rpm: 60
      daily_requests: 1000
      per_5h_requests: 300
      weekly_requests: 5000
      no_retry_duration: 3600
      budget:
        input_price_per_1m: 2.50
        output_price_per_1m: 10.00
        daily: 5.0
        weekly: 25.0
        monthly: 80.0
        no_retry_duration: 3600

  anthropic-primary:
    base_url: "https://api.anthropic.com"
    api_key: "${ANTHROPIC_API_KEY}"
    type: anthropic
    retry:
      max_retries: 3
      cooldown_after: 5
      cooldown_duration: 300
      error_limits:
        429: 1
        500: 3
        529: 3
    usage:
      rpm: 50
      daily_requests: 500
      per_5h_requests: 150
      weekly_requests: 2500
      no_retry_duration: 3600
      budget:
        input_price_per_1m: 3.00
        output_price_per_1m: 15.00
        daily: 5.0
        weekly: 25.0
        monthly: 80.0
        no_retry_duration: 3600

  openai-backup:
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_BACKUP_API_KEY}"
    type: openai
    retry:
      max_retries: 2
      cooldown_after: 3
      cooldown_duration: 120
      error_limits:
        429: 1
        500: 2
    usage:
      rpm: 30
      daily_requests: 500

groups:
  main:
    strategy: sequential
    members:
      - api: openai-primary
      - group: fallback

  fallback:
    strategy: load_balance
    members:
      - api: anthropic-primary
      - api: openai-backup
